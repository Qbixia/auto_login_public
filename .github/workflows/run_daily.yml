name: Run Python Script Daily

on:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 11：30左右 点运行
  workflow_dispatch:      # 允许手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 更新到了 v4，更稳定

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新到了 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # 直接在这里安装你需要的库

      - name: Run script
        run: python auto_login.py