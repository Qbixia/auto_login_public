name: Run Python Script Daily

on:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 11：30左右 点运行
  workflow_dispatch:      # 允许手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 更新到了 v4，更稳定

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新到了 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # 直接在这里安装你需要的库
      - name: Run script
        run: python auto_login.py
        
      - name: Update last_active file
        run: |
          echo "Last active: $(date)" > last_active.txt
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_active.txt
          git commit -m "chore: keep repository active to prevent workflow suspension"
          git push

      
